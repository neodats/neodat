<!DOCTYPE html>
<html>
<head>
  <title>La Tierra dando vueltas</title>
  <style>
    /* Estilos para centrar la Tierra en la pantalla */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0; /* Color de fondo opcional */
    }

    /* Contenedor para la Tierra */
    .earth-container {
      width: 300px; /* Tamaño de la Tierra */
      height: 300px;
      position: relative;
    }

    /* Estilos para la imagen de la Tierra */
    .earth {
      width: 100%;
      height: 100%;
      border-radius: 50%; /* Para que la imagen sea redonda */
      animation: rotateEarth 10s infinite linear; /* Aplicar la animación */
    }

    /* Animación para hacer girar la Tierra */
    @keyframes rotateEarth {
      0% {
        transform: rotate(0deg); /* Posición inicial */
      }
      100% {
        transform: rotate(360deg); /* Posición final: una vuelta completa */
      }
    }
  </style>
</head>
<body>
  <div class="earth-container">
    <img src="earth.png" alt="La Tierra" class="earth">
  </div>
</body>
</html>
